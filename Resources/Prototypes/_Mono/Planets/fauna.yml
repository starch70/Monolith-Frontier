# Desert fauna

- type: entityTable
  id: MonoFaunaDesert
  table: !type:GroupSelector
    children:
    - id: MobLizard
      weight: 0.5
    - id: MobSnake
      weight: 0.25
    - id: MobKangaroo
      weight: 0.25

- type: entity
  id: MonoFaunaDesert
  parent: MarkerBase
  name: planet fauna spawner
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    layers:
    - state: green
  - type: EntityTableSpawner
    offset: 0
    table: !type:NestedSelector
      tableId: MonoFaunaDesert

